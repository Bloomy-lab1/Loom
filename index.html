<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loom OS | Student Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090b10; --sidebar: #11141d; --card: #1a1f2b;
            --accent: #c084fc; --text: #ffffff; --text-dim: #94a3b8;
            --border: #2d3748; --success: #22c55e; --danger: #ef4444;
            --discord: #5865F2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 2.5rem; border-radius: 24px; width: 100%; max-width: 400px; border: 1px solid var(--border); text-align: center; }
        
        /* APP LAYOUT */
        #app-screen { display: none; height: 100vh; width: 100vw; }
        nav { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem; flex-shrink: 0; }
        main { flex: 1; padding: 2rem; overflow-y: auto; background: var(--bg); }

        .user-profile { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; }

        .nav-item { padding: 12px 15px; border-radius: 12px; cursor: pointer; margin-bottom: 5px; color: var(--text-dim); font-weight: 600; display: flex; align-items: center; gap: 10px; transition: 0.2s; text-decoration: none; }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: white; }
        .discord-nav { background: var(--discord) !important; color: white !important; margin-top: 10px; justify-content: center; }

        /* GRID & CARDS */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; }
        .card { background: var(--card); border-radius: 20px; padding: 1.5rem; border: 1px solid var(--border); margin-bottom: 1.2rem; }
        .span-2 { grid-column: span 2; }
        .view { display: none; animation: slideUp 0.4s ease; }
        .view.active { display: block; }

        /* TIMETABLE */
        .tt-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .tt-day { background: #090b10; padding: 10px; border-radius: 10px; min-height: 150px; border: 1px solid var(--border); }
        .tt-label { font-weight: 800; color: var(--accent); margin-bottom: 8px; font-size: 0.7rem; text-transform: uppercase; }
        .class-tag { background: var(--accent); font-size: 0.75rem; padding: 5px; border-radius: 5px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }

        /* INPUTS */
        input, select, textarea { width: 100%; background: #090b10; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        .danger-btn { background: var(--danger) !important; width: auto; padding: 4px 8px; font-size: 0.7rem; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="margin-bottom: 10px;">LOOM OS<span>.</span></h1>
            <p style="color:var(--text-dim); margin-bottom: 20px; font-size: 0.9rem;">Sign in to stay connected</p>
            <input type="text" id="auth-user" placeholder="Username">
            <input type="password" id="auth-pass" placeholder="Password">
            <button onclick="handleAuth('login')">Login</button>
            <button style="background:#2d3748; margin-top:10px;" onclick="handleAuth('signup')">Create Account</button>
            <p id="auth-msg" style="margin-top: 15px; font-size: 0.8rem; color: var(--danger);"></p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-screen">
        <div style="display: flex; height: 100%;">
            <nav>
                <div class="user-profile">
                    <div class="avatar" id="user-avatar">?</div>
                    <div>
                        <div id="user-display-name" style="font-weight: 800;">User</div>
                        <div style="font-size: 0.7rem; color: var(--text-dim);">Logged In</div>
                    </div>
                </div>
                
                <div class="nav-item active" onclick="showView('v-dash', this)">🏠 Dashboard</div>
                <div class="nav-item" onclick="showView('v-sched', this)">📅 Timetable</div>
                <div class="nav-item" onclick="showView('v-grades', this)">📈 GPA Tracker</div>
                
                <a href="https://discord.gg/UTP4HEuPyg" target="_blank" class="nav-item discord-nav">💬 Community Discord</a>
                
                <div style="margin-top: auto;">
                    <button style="background:#2d3748" onclick="logout()">Logout / Exit</button>
                </div>
            </nav>

            <main>
                <!-- DASHBOARD -->
                <div id="v-dash" class="view active">
                    <div class="grid">
                        <div class="card span-2">
                            <h2>✂️ Task Shredder</h2>
                            <div style="display: flex; gap: 10px;">
                                <input type="text" id="task-input" placeholder="What needs to get done?">
                                <button onclick="shredTask()" style="width: auto;">Add Task</button>
                            </div>
                            <div id="task-list" style="margin-top: 10px;"></div>
                        </div>
                        <div class="card">
                            <h2>⏱️ Focus Timer</h2>
                            <div id="timer-display" style="font-size: 3rem; font-weight: 800; text-align: center; margin: 15px 0;">25:00</div>
                            <button onclick="toggleTimer()" id="timer-btn">START</button>
                        </div>
                        <div class="card span-2">
                            <h2>📝 Notes</h2>
                            <textarea id="user-notes" style="height: 150px;" oninput="syncData()" placeholder="Your scratchpad..."></textarea>
                        </div>
                        <div class="card">
                            <h2>💧 Water</h2>
                            <div id="water-val" style="font-size: 3rem; font-weight: 800; text-align: center;">0</div>
                            <button onclick="addWater()">Drink (250ml)</button>
                        </div>
                    </div>
                </div>

                <!-- TIMETABLE -->
                <div id="v-sched" class="view">
                    <div class="card">
                        <h2>📅 Weekly Schedule</h2>
                        <div class="tt-grid">
                            <div class="tt-day"><div class="tt-label">Mon</div><div id="day-0"></div></div>
                            <div class="tt-day"><div class="tt-label">Tue</div><div id="day-1"></div></div>
                            <div class="tt-day"><div class="tt-label">Wed</div><div id="day-2"></div></div>
                            <div class="tt-day"><div class="tt-label">Thu</div><div id="day-3"></div></div>
                            <div class="tt-day"><div class="tt-label">Fri</div><div id="day-4"></div></div>
                        </div>
                        <div style="margin-top: 20px; display: flex; gap: 10px;">
                            <input type="text" id="class-name" placeholder="Class Name">
                            <select id="class-day" style="width: 150px;">
                                <option value="0">Mon</option><option value="1">Tue</option>
                                <option value="2">Wed</option><option value="3">Thu</option>
                                <option value="4">Fri</option>
                            </select>
                            <button onclick="addClass()" style="width: auto;">Add to Schedule</button>
                        </div>
                    </div>
                </div>

                <!-- GPA TRACKER -->
                <div id="v-grades" class="view">
                    <div class="card">
                        <h2>📈 GPA Calculator</h2>
                        <div id="grade-rows"></div>
                        <div style="display: flex; gap: 10px; margin-top: 10px;">
                            <button onclick="addGradeRow()" style="background:#2d3748;">+ New Subject</button>
                            <button onclick="calculateGPA()" style="background:var(--success);">Calculate & Save</button>
                        </div>
                        <h1 id="gpa-result" style="text-align: center; margin-top: 20px; font-size: 4rem;">0.00</h1>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // --- CORE DATABASE ---
        let users = JSON.parse(localStorage.getItem('loom_users')) || {};
        let currentUser = null;

        // --- SESSION PERSISTENCE LOGIC ---
        window.onload = () => {
            const savedSession = localStorage.getItem('loom_session');
            if (savedSession && users[savedSession]) {
                currentUser = savedSession;
                launchApp();
            }
        };

        function handleAuth(type) {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            const msg = document.getElementById('auth-msg');

            if(!u || !p) return;

            if(type === 'signup') {
                if(users[u]) { msg.innerText = "Username exists!"; return; }
                users[u] = { 
                    pass: p, 
                    data: { notes: "", tasks: [], water: 0, timetable: [[],[],[],[],[]], grades: [] } 
                };
                saveToDisk();
                msg.style.color = "var(--success)";
                msg.innerText = "Account Created! Now Login.";
            } else {
                if(users[u] && users[u].pass === p) {
                    currentUser = u;
                    localStorage.setItem('loom_session', u); // SAVE SESSION
                    launchApp();
                } else { msg.innerText = "Invalid Login Details."; }
            }
        }

        function launchApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            loadUserData();
        }

        function logout() {
            localStorage.removeItem('loom_session'); // WIPE SESSION
            location.reload();
        }

        function saveToDisk() {
            localStorage.setItem('loom_users', JSON.stringify(users));
        }

        function loadUserData() {
            const d = users[currentUser].data;
            document.getElementById('user-display-name').innerText = currentUser;
            document.getElementById('user-avatar').innerText = currentUser[0].toUpperCase();
            document.getElementById('user-notes').value = d.notes || "";
            document.getElementById('water-val').innerText = d.water || 0;
            renderTasks();
            renderTimetable();
            renderGrades();
        }

        function syncData() {
            if(!currentUser) return;
            users[currentUser].data.notes = document.getElementById('user-notes').value;
            saveToDisk();
        }

        function showView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // --- FEATURE LOGIC ---
        function shredTask() {
            const val = document.getElementById('task-input').value;
            if(!val) return;
            users[currentUser].data.tasks.push({ text: val, id: Date.now() });
            document.getElementById('task-input').value = "";
            renderTasks();
            saveToDisk();
        }

        function renderTasks() {
            document.getElementById('task-list').innerHTML = users[currentUser].data.tasks.map(t => `
                <div class="card" style="margin-bottom:8px; padding:12px; display:flex; justify-content:space-between; align-items:center;">
                    <span>${t.text}</span>
                    <button class="danger-btn" onclick="deleteTask(${t.id})">DONE</button>
                </div>
            `).join('');
        }

        function deleteTask(id) {
            users[currentUser].data.tasks = users[currentUser].data.tasks.filter(t => t.id !== id);
            renderTasks();
            saveToDisk();
        }

        function addWater() {
            users[currentUser].data.water++;
            document.getElementById('water-val').innerText = users[currentUser].data.water;
            saveToDisk();
        }

        function addClass() {
            const name = document.getElementById('class-name').value;
            const day = document.getElementById('class-day').value;
            if(!name) return;
            users[currentUser].data.timetable[day].push(name);
            renderTimetable();
            saveToDisk();
            document.getElementById('class-name').value = "";
        }

        function renderTimetable() {
            for(let i=0; i<5; i++) {
                document.getElementById(`day-${i}`).innerHTML = users[currentUser].data.timetable[i].map((c, idx) => `
                    <div class="class-tag">
                        ${c} <span style="cursor:pointer; font-weight:800;" onclick="removeClass(${i}, ${idx})">×</span>
                    </div>
                `).join('');
            }
        }

        function removeClass(day, idx) {
            users[currentUser].data.timetable[day].splice(idx, 1);
            renderTimetable();
            saveToDisk();
        }

        function addGradeRow(s="", g="", c="") {
            const div = document.createElement('div');
            div.className = "grade-row";
            div.style.display = "flex"; div.style.gap = "10px"; div.style.marginBottom = "8px";
            div.innerHTML = `
                <input type="text" placeholder="Subject" value="${s}" class="g-sub">
                <input type="number" placeholder="Grade" value="${g}" class="g-gr" style="width:80px">
                <input type="number" placeholder="Credits" value="${c}" class="g-cr" style="width:80px">
            `;
            document.getElementById('grade-rows').appendChild(div);
        }

        function renderGrades() {
            document.getElementById('grade-rows').innerHTML = "";
            const gData = users[currentUser].data.grades;
            if(gData.length === 0) addGradeRow();
            else gData.forEach(g => addGradeRow(g.sub, g.gr, g.cr));
            calculateGPA();
        }

        function calculateGPA() {
            const rows = document.querySelectorAll('.grade-row');
            let totalPts = 0, totalCr = 0;
            users[currentUser].data.grades = [];

            rows.forEach(r => {
                const sub = r.querySelector('.g-sub').value;
                const gr = parseFloat(r.querySelector('.g-gr').value);
                const cr = parseFloat(r.querySelector('.g-cr').value);
                if(gr && cr) {
                    users[currentUser].data.grades.push({sub, gr, cr});
                    totalPts += (gr * cr); totalCr += cr;
                }
            });

            const res = totalCr > 0 ? (totalPts / totalCr).toFixed(2) : "0.00";
            document.getElementById('gpa-result').innerText = res;
            saveToDisk();
        }

        // --- TIMER ---
        let timerTime = 1500, timerInt = null;
        function toggleTimer() {
            const btn = document.getElementById('timer-btn');
            if(timerInt) { clearInterval(timerInt); timerInt = null; btn.innerText = "START"; }
            else {
                timerInt = setInterval(() => {
                    timerTime--;
                    let m = Math.floor(timerTime/60), s = timerTime%60;
                    document.getElementById('timer-display').innerText = `${m}:${s<10?'0':''}${s}`;
                    if(timerTime <= 0) { clearInterval(timerInt); alert("Session Done!"); }
                }, 1000);
                btn.innerText = "PAUSE";
            }
        }
    </script>
</body>
</html>
